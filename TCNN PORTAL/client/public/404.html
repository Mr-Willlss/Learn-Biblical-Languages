<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TCNN Portal</title>
    <script>
      // GitHub Pages SPA fallback:
      // Redirect all unknown routes to the app entry (hash routing keeps it simple).
      var base = window.location.pathname.split("/").slice(0, -1).join("/") + "/";
      window.location.replace(base + "#/");
    </script>
  </head>
  <body></body>
</html>
