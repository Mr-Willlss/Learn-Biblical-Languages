name: Android CI - Build TWA APK

on:
  workflow_dispatch: {}
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: ${{ runner.temp }}/android-sdk

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Android command-line tools and build tools
      run: |
        mkdir -p $ANDROID_HOME/cmdline-tools
        cd $ANDROID_HOME
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline.zip
        unzip -q cmdline.zip -d cmdline-tools
        mv cmdline-tools/cmdline-tools cmdline-tools/latest || true
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "platforms;android-36" "build-tools;36.0.0"

    - name: Decode keystore from secret
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        mkdir -p twa
        echo "$KEYSTORE_BASE64" | base64 --decode > twa/android-keystore

    - name: Make gradlew executable
      run: chmod +x twa/gradlew

    - name: Build unsigned release APK
      run: |
        cd twa
        ./gradlew app:assembleRelease --no-daemon -Porg.gradle.jvmargs="-Xmx1536m"
      env:
        ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}

    - name: Sign the release APK with apksigner
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        unsigned_apk=$(ls twa/app/build/outputs/apk/release/*-unsigned.apk || true)
        if [ -z "$unsigned_apk" ]; then
          unsigned_apk=twa/app/build/outputs/apk/release/app-release-unsigned.apk
        fi
        signed_apk=twa/app/build/outputs/apk/release/app-release-signed.apk
        $ANDROID_HOME/build-tools/36.0.0/apksigner sign --ks twa/android-keystore --ks-pass pass:$KEYSTORE_PASSWORD --key-pass pass:$KEY_PASSWORD --out $signed_apk $unsigned_apk

    - name: Upload signed APK
      uses: actions/upload-artifact@v4
      with:
        name: twa-release-apk
        path: twa/app/build/outputs/apk/release/app-release-signed.apk
